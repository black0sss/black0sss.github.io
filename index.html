<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حرم التحفيز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0a0a12;
  --gold: #f5c842;
  --teal: #00e5c3;
  --rose: #ff5e7d;
  --pale: #e8e0ff;
  --glass: rgba(255,255,255,0.05);
  --glass2: rgba(255,255,255,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  background: var(--ink);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* ======= BACKGROUND ======= */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.25;
  animation: drift 12s ease-in-out infinite alternate;
}
.orb1 { width:500px;height:500px;background:#7b2fbe;top:-100px;right:-100px;animation-delay:0s; }
.orb2 { width:400px;height:400px;background:#0099cc;bottom:-80px;left:-80px;animation-delay:-4s; }
.orb3 { width:300px;height:300px;background:#ff3366;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s; }

@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,20px) scale(1.1); }
}

/* stars */
.stars {
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 90% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 25% 50%, rgba(255,255,255,0.5) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ======= CARD ======= */
.card {
  position: relative;
  z-index: 10;
  width: 95%;
  max-width: 460px;
  padding: 32px 28px;
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(30px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(40px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ======= HEADER ======= */
.header {
  text-align: center;
  margin-bottom: 26px;
}

.header .logo {
  font-size: 40px;
  display: block;
  margin-bottom: 6px;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}

.header p {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  font-weight: 300;
}

/* ======= SECTION LABEL ======= */
.section-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0.8;
}

/* ======= GRID BUTTONS ======= */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.btn {
  padding: 13px 10px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(.16,1,.3,1);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--teal), #7b2fbe);
  opacity: 0;
  transition: opacity 0.25s;
}

.btn:hover::before, .btn.active::before { opacity: 1; }
.btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,229,195,0.25); color: #fff; border-color: transparent; }
.btn:active { transform: scale(0.97); }

.btn span { position: relative; z-index: 1; }
.btn .icon { display: block; font-size: 20px; margin-bottom: 4px; }

/* ======= MESSAGE BOX ======= */
.message-wrap {
  position: relative;
}

.message-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.message-label .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.message {
  min-height: 100px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(245,200,66,0.1), rgba(0,229,195,0.08));
  border: 1px solid rgba(245,200,66,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 10px;
  transition: all 0.5s cubic-bezier(.16,1,.3,1);
}

.message .msg-text {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  line-height: 1.7;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s ease 0.1s;
}

.message .msg-place {
  font-size: 12px;
  font-weight: 400;
  color: var(--teal);
  opacity: 0;
  transform: translateY(5px);
  transition: all 0.3s ease 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.message.show .msg-text,
.message.show .msg-place {
  opacity: 1;
  transform: translateY(0);
}

.message .placeholder {
  font-size: 14px;
  color: rgba(255,255,255,0.3);
  font-weight: 300;
}

/* ======= FOOTER ======= */
.footer {
  margin-top: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.counter-badge {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
}

.counter-badge span {
  color: var(--gold);
  font-weight: 700;
}

.refresh-btn {
  padding: 8px 16px;
  border: 1px solid rgba(0,229,195,0.3);
  border-radius: 20px;
  background: rgba(0,229,195,0.08);
  color: var(--teal);
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover {
  background: var(--teal);
  color: #000;
  transform: scale(1.05);
}

/* ======= RIPPLE ======= */
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}
.ripple-effect {
  position: absolute;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transform: scale(0);
  animation: ripple 0.5s linear;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="stars"></div>

<div class="card">

  <div class="header">
    <span class="logo">🎓</span>
    <h1>حرم التحفيز</h1>
    <p>اختر موقعك — نبعث لك طاقة تناسبه</p>
  </div>

  <div class="section-label">📍 أين أنت الآن؟</div>

  <div class="grid">
    <button class="btn" onclick="generate('class', this)">
      <span class="icon">📚</span>
      <span>الفصل الدراسي</span>
    </button>
    <button class="btn" onclick="generate('hall', this)">
      <span class="icon">🚶</span>
      <span>الممر الجامعي</span>
    </button>
    <button class="btn" onclick="generate('cafe', this)">
      <span class="icon">☕</span>
      <span>الكافيتيريا</span>
    </button>
    <button class="btn" onclick="generate('services', this)">
      <span class="icon">🏢</span>
      <span>خدمات الطلبة</span>
    </button>
  </div>

  <div class="grid-3">
    <button class="btn" onclick="generate('F', this)">
      <span class="icon">🏫</span>
      <span>مبنى F</span>
    </button>
    <button class="btn" onclick="generate('E', this)">
      <span class="icon">🏫</span>
      <span>مبنى E</span>
    </button>
    <button class="btn" onclick="generate('G', this)">
      <span class="icon">🏫</span>
      <span>مبنى G</span>
    </button>
  </div>

  <div class="message-wrap">
    <div class="message-label">
      <div class="dot"></div>
      <span style="font-size:12px;color:rgba(255,255,255,0.4);font-weight:400;">رسالتك اليوم</span>
    </div>
    <div class="message" id="messageBox">
      <span class="placeholder">✨ اضغط على موقعك لتحصل على جرعة تحفيز</span>
    </div>
  </div>

  <div class="footer">
    <div class="counter-badge">تم توليد <span id="countNum">0</span> رسالة</div>
    <button class="refresh-btn" onclick="regenerate()">🔄 رسالة جديدة</button>
  </div>

</div>

<script>
// ============================================
// بنك العبارات الضخم — 3 طبقات × مواقع × نهايات
// ============================================

const data = {

  // المقدمات العامة (تُستخدم في كل مكان)
  openers: [
    "أنت","كل خطوة تخطوها","كل ثانية تمضيها","حضورك هنا","إصرارك","صبرك","طموحك","تعبك الآن","كفاحك","حلمك الكبير","شجاعتك","إرادتك من حديد","عزيمتك","قيامك كل يوم","بذلك من جهد"
  ],

  // عبارات خاصة بكل مكان
  placeMessages: {
    class: [
      "كل سؤال تطرحه يشحذ عقلك",
      "الانتباه الآن يعني نجاحاً لاحقاً",
      "لو فهمت درساً واحداً اليوم ربحت",
      "الفصل مكان الأسرار الكبيرة — استمع جيداً",
      "ما تتعلمه الآن سيحل مشكلة يوماً ما",
      "كن حاضراً بعقلك لا جسمك فقط",
      "النخبة لا تنتظر الامتحان كي تفهم",
      "الورقة أمامك بداية لمشروع ستفخر به"
    ],
    hall: [
      "كل ممر تمشيه هو خطوة نحو مستقبلك",
      "امشِ وأنت تشعر أنك تمتلك الطريق",
      "التنقل ذهناً هو أهم من التنقل قدماً",
      "حتى لحظات المشي فرصة لمراجعة أهدافك",
      "كل شخص تراه هنا يكافح مثلك تماماً",
      "رأسك مرفوع لأنك هنا بإرادتك",
      "هذا الممر رأى أناساً عظماء — كن منهم"
    ],
    cafe: [
      "الراحة وقود لا تهاون",
      "هذه الاستراحة ستجعلك تعمل بشكل أفضل",
      "استرح جيداً لأن أمامك عوالم تغزوها",
      "حتى أعظم العقول تحتاج فنجان قهوة",
      "اشحن طاقتك — المعركة الحقيقية لم تبدأ بعد",
      "محادثة قصيرة مع زميل ترسم شراكة قادمة",
      "الراحة الواعية جزء من الإنتاج"
    ],
    services: [
      "كل إجراء تنهيه اليوم يريح غدك",
      "حل المشكلات الإدارية يبني صبرك",
      "التنظيم والانضباط صفات الناجحين",
      "حتى الأوراق الروتينية جزء من رحلتك",
      "لا تستهن بأي خطوة في مشوارك الجامعي",
      "إنهاء هذا الإجراء دليل على مثابرتك"
    ],
    F: [
      "مبنى F شهد بدايات مئات الناجحين",
      "الجدران هنا تحفظ قصص طلاب أثروا العالم",
      "أنت الآن في المكان الصحيح في الوقت الصحيح",
      "كل غرفة هنا تخبئ فرصة — ابحث عنها",
      "هذا المبنى سيتذكرك يوماً ما"
    ],
    E: [
      "مبنى E هو ساحة لصناعة العقول",
      "كل طابق هنا حمل أحلاماً صارت حقيقة",
      "الطاقة هنا لا تُقاوم — امتصها وارتقِ",
      "أنت بين جدران تشهد على مسيرتك",
      "مستقبلك يبدأ هنا والآن"
    ],
    G: [
      "مبنى G — حيث تولد الأفكار الكبيرة",
      "كل زاوية هنا شهدت لحظة إدراك عظيمة",
      "أنت جزء من إرث هذا المبنى — اصنعه بجدارة",
      "الإبداع لا يُحدّ بجدران — انطلق",
      "هنا بدأ أناس صنعوا فرقاً — أنت التالي"
    ]
  },

  // الأفعال العامة
  verbs: [
    "يصنع مستقبلك","يقربك من حلمك","يبني نجاحك","يزيد قوتك","يغير حياتك","يرفع مستواك","يصنع فرقاً","يؤدي دوراً كبيراً","يعكس شخصيتك","يفتح أبواباً","يكتب قصة نجاحك","يُقربك من النسخة الأفضل منك","يُثبت أنك جاد","يُلهم من حولك","يُضيف لبنة في صرح حياتك"
  ],

  // النهايات
  endings: [
    "فاستمر 💪","ولا تتوقف 🔥","وأنت قدها ✨","والقادم أجمل 🌟","ولا تنظر للخلف 🚀","فأنت مميز 🎯","والتعب سيتحول إلى فخر 🏆","وثق بنفسك 🌙","وأنت أقوى مما تظن ⚡","فالنجاح ينتظرك 🎓","وكل صعب سيصبح سهلاً 🌈","والعالم يحتاج ما لديك 🌍","فالنجاح حليف المثابرين 🥇","وكن نسخة أفضل كل يوم 🌱","فالفجر قريب بعد كل ليل 🌅"
  ],

  // جمل كاملة إضافية (تُضاف مباشرة)
  bonusQuotes: [
    "يوم صعب في الجامعة أفضل من يوم سهل بلا تعلم 📖",
    "لو لم يكن الأمر صعباً، لما كان يستحق 🔑",
    "ليس عليك أن تكون الأفضل، فقط كن أفضل مما كنت أمس 📈",
    "الذكاء الحقيقي هو الاستمرار حين يريد الجميع التوقف 🧠",
    "كل فشل صغير هو خطوة نحو نجاح كبير 🌊",
    "الجامعة ليست فقط درجات — إنها تشكيل شخصية 🎭",
    "من ينام مبكراً لمن استنفد طاقته في طلب العلم 😴✨",
    "عقلك عضلة — وأنت هنا تمرّنه يومياً 💡",
    "كل محاضرة مللت منها أضافت شيئاً لا تشعر به الآن 🌿",
    "الفرق بين من ينجح ومن لا ينجح: المثابرة فقط ⚙️",
    "حتى التعثر هنا أفضل من الثبات في مكان آخر 🏃",
    "لا تحتاج إلى الكمال — تحتاج فقط إلى المضي قدماً 🛤️"
  ]
};

let usedMessages = new Set();
let totalGenerated = 0;
let lastPlace = null;
let lastBtn = null;

function generate(place, btnEl) {
  lastPlace = place;
  if (lastBtn) lastBtn.classList.remove('active');
  if (btnEl) { btnEl.classList.add('active'); lastBtn = btnEl; }

  // Ripple effect
  if (btnEl) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple-effect';
    ripple.style.left = '50%'; ripple.style.top = '50%';
    ripple.style.marginLeft = '-30px'; ripple.style.marginTop = '-30px';
    btnEl.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }

  const message = buildMessage(place);
  showMessage(message, place);
  totalGenerated++;
  document.getElementById('countNum').textContent = totalGenerated;

  if (navigator.vibrate) navigator.vibrate([30, 20, 40]);
}

function buildMessage(place) {
  let msg;
  let attempts = 0;

  do {
    const rand = Math.random();

    if (rand < 0.3 && data.placeMessages[place]) {
      // رسالة خاصة بالمكان
      const list = data.placeMessages[place];
      msg = list[Math.floor(Math.random() * list.length)];

    } else if (rand < 0.5) {
      // جملة بونص كاملة
      const list = data.bonusQuotes;
      msg = list[Math.floor(Math.random() * list.length)];

    } else {
      // جملة مُركبة
      const o = data.openers[Math.floor(Math.random() * data.openers.length)];
      const v = data.verbs[Math.floor(Math.random() * data.verbs.length)];
      const e = data.endings[Math.floor(Math.random() * data.endings.length)];
      const placeLbl = getPlaceName(place);
      msg = `${o} في ${placeLbl} ${v} ${e}`;
    }

    attempts++;
  } while (usedMessages.has(msg) && attempts < 300);

  usedMessages.add(msg);
  if (usedMessages.size > 80) usedMessages.clear(); // reset to avoid blocking
  return msg;
}

function regenerate() {
  if (lastPlace) generate(lastPlace, lastBtn);
}

function showMessage(text, place) {
  const box = document.getElementById('messageBox');
  box.classList.remove('show');
  box.innerHTML = '';

  setTimeout(() => {
    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    textEl.textContent = text;

    const placeEl = document.createElement('div');
    placeEl.className = 'msg-place';
    placeEl.innerHTML = `📍 ${getPlaceName(place)}`;

    box.appendChild(textEl);
    box.appendChild(placeEl);
    box.classList.add('show');
  }, 200);
}

function getPlaceName(code) {
  const names = {
    class: 'الفصل الدراسي',
    hall: 'الممر الجامعي',
    cafe: 'الكافيتيريا',
    services: 'خدمات الطلبة',
    F: 'مبنى F',
    E: 'مبنى E',
    G: 'مبنى G'
  };
  return names[code] || code;
}
</script>
</body>
</html>
