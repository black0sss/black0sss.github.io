<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Motivation</title>

<style>
:root{
  --bg1:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
  --glass:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f5d4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  direction:rtl;
  color:var(--text);
  overflow:hidden;
}

.container{
  width:95%;
  max-width:430px;
  padding:25px;
  border-radius:30px;
  background:var(--glass);
  backdrop-filter: blur(25px);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  text-align:center;
  animation:fadeUp 1s ease;
}

h1{
  font-size:22px;
  margin-bottom:20px;
  letter-spacing:1px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:14px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease;
  backdrop-filter:blur(10px);
}

button:hover{
  transform:translateY(-4px);
  background:var(--accent);
  color:#000;
}

.message{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  min-height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.12);
  font-size:17px;
  line-height:1.6;
  opacity:0;
  transform:translateY(10px);
  transition:0.4s ease;
}

.message.show{
  opacity:1;
  transform:translateY(0);
}

.counter{
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="container">
  <h1>📍 اختر موقعك داخل الحرم</h1>

  <div class="grid">
    <button onclick="generate('class')">فصل دراسي</button>
    <button onclick="generate('hall')">ممر جامعي</button>
    <button onclick="generate('cafe')">الكافيتيريا</button>
    <button onclick="generate('services')">خدمات الطلبة</button>
    <button onclick="generate('F')">مبنى F</button>
    <button onclick="generate('E')">مبنى E</button>
    <button onclick="generate('G')">مبنى G</button>
  </div>

  <div class="message" id="messageBox"></div>
  <div class="counter" id="counter"></div>
</div>

<script>

// أجزاء الجمل (تتكون عشوائياً = آلاف الاحتمالات)
const openings = [
"أنت اليوم","كل خطوة","كل دقيقة","وجودك هنا","اجتهادك","تعبك","حضورك","محاولتك"
];

const actions = [
"يصنع مستقبلك","يقربك من حلمك","يبني نجاحك","يزيد قوتك","يغير حياتك","يرفع مستواك","يصنع فرقاً كبيراً"
];

const endings = [
"فاستمر 💪","ولا تتوقف 🔥","وأنت قدها ✨","والقادم أجمل 🌟","ولا تنظر للخلف 🚀","فأنت مميز 🎯"
];

// تخزين الرسائل المستخدمة لمنع التكرار
let usedMessages = new Set();
let totalGenerated = 0;

function generate(place){

let message;
let attempts = 0;

// توليد جملة فريدة
do{
  const o = openings[Math.floor(Math.random()*openings.length)];
  const a = actions[Math.floor(Math.random()*actions.length)];
  const e = endings[Math.floor(Math.random()*endings.length)];
  message = `${o} في ${placeName(place)} ${a} ${e}`;
  attempts++;
}while(usedMessages.has(message) && attempts < 500);

usedMessages.add(message);
totalGenerated++;

showMessage(message);
}

function placeName(code){
switch(code){
  case 'class': return "الفصل الدراسي";
  case 'hall': return "الممر الجامعي";
  case 'cafe': return "الكافيتيريا";
  case 'services': return "خدمات الطلبة";
  case 'F': return "مبنى F";
  case 'E': return "مبنى E";
  case 'G': return "مبنى G";
}
}

function showMessage(text){
const box = document.getElementById("messageBox");
box.classList.remove("show");

setTimeout(()=>{
  box.innerText = text;
  box.classList.add("show");
  document.getElementById("counter").innerText =
  `عدد الرسائل التي تم توليدها: ${totalGenerated}`;
},200);

if(navigator.vibrate){
  navigator.vibrate(40);
}
}

</script>

</body>
</html>
